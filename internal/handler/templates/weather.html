<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Forecast</title>
</head>
<body>
  <h1>Weather Forecast</h1>

  <form method="POST" action="/weather">
    <label for="city">City:</label>
    <select id="city" name="city" required>
      <option value="Wetzikon" {{if eq .City "Wetzikon"}}selected{{end}}>Wetzikon</option>
      <option value="Sofia" {{if eq .City "Sofia"}}selected{{end}}>Sofia</option>
    </select>
    <button type="submit">Submit</button>
  </form>

  {{if .Error}}
    <p style="color: red;">{{.Error}}</p>
  {{end}}

  {{if .Results}}
    <h2>Forecast for {{.City}}</h2>
    <table border="1" cellpadding="4">
      <tr>
        <th>Date</th>
        <th>Avg Temp (C)</th>
        <th>Sunrise</th>
        <th>Sunset</th>
      </tr>
      {{range .Results}}
      <tr>
        <td>{{.Date}}</td>
        <td>{{.AvgTempC}}</td>
        <td>{{.Sunrise}}</td>
        <td>{{.Sunset}}</td>
      </tr>
      {{end}}
    </table>
  {{end}}
</body>
</html>
